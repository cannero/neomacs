experimental = ["wrapper-scripts"]

# Memory-limited wrapper: each test process gets a 1GB cgroup memory limit.
# Prevents runaway tests from OOM-killing the system.
[scripts.wrapper.memory-limit]
command = 'systemd-run --user --scope -q -p MemoryMax=1G --'

[test-groups]
# neovm-gc now has a large integration-style suite. Keep aggregate memory bounded even though
# each test is already individually wrapped by the memory-limit script above.
neovm-gc-memory = { max-threads = 4 }

[profile.default]
# Many tests use the bootstrap evaluator (which loads 122 .el files)
# even without "bootstrap" in their name. 120s covers the ~63s
# bootstrap initialization plus test execution time.
slow-timeout = { period = "120s", terminate-after = 1 }

# Apply memory limit to all tests
[[profile.default.scripts]]
filter = 'all()'
run-wrapper = 'memory-limit'

# Oracle tests get longer timeouts
[[profile.default.overrides]]
filter = 'test(/^emacs_core::oracle_test::/)'
slow-timeout = { period = "120s", terminate-after = 1 }

# Bootstrap tests need much longer timeouts
[[profile.default.overrides]]
filter = 'test(bootstrap) | test(pdump) | test(loadup)'
slow-timeout = { period = "600s", terminate-after = 1 }
threads-required = 1

# Compiled .neobc runtime-surface tests can pay the full cold bootstrap cost
# on the first cached-evaluator build after a Lisp fingerprint change.
[[profile.default.overrides]]
filter = 'package(=neovm-core) and test(/compiled_neobc_.*/)'
slow-timeout = { period = "600s", terminate-after = 1 }

# GNU-vs-NeoVM compatibility integration tests also need the cold-bootstrap budget.
[[profile.default.overrides]]
filter = 'package(=neovm-core) and test(/compat_.*_matches_gnu_emacs/)'
slow-timeout = { period = "600s", terminate-after = 1 }

# Loadup bootstrap is the slowest (cold start can take >300s)
[[profile.default.overrides]]
filter = 'package(=neovm-core) and test(=emacs_core::load::tests::neovm_loadup_bootstrap)'
slow-timeout = { period = "600s", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'package(=neovm-gc)'
test-group = 'neovm-gc-memory'

[[profile.default.overrides]]
filter = 'package(=neovm-gc) and test(/background_worker_.*/)'
threads-required = 'num-test-threads'
