<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" role="img" aria-labelledby="title desc">
  <title id="title">NEOMACS Banner</title>
  <desc id="desc">Stylized NEOMACS wordmark with geometric neon accents.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="45%" stop-color="#0d1f33"/>
      <stop offset="100%" stop-color="#121729"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 210) rotate(22) scale(420 260)">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1330 250) rotate(-18) scale(500 300)">
      <stop offset="0%" stop-color="#ff9d2e" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#ff9d2e" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66f0ff"/>
      <stop offset="55%" stop-color="#9cffc4"/>
      <stop offset="100%" stop-color="#ffcf6a"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="22%" stop-color="#00d4ff" stop-opacity="0.95"/>
      <stop offset="78%" stop-color="#ffb347" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#8eb8d6" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="titleGlow" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blurA"/>
      <feGaussianBlur stdDeviation="3" result="blurB"/>
      <feMerge>
        <feMergeNode in="blurA"/>
        <feMergeNode in="blurB"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect width="1600" height="500" fill="url(#grid)" opacity="0.45"/>
  <rect width="1600" height="500" fill="url(#glowLeft)"/>
  <rect width="1600" height="500" fill="url(#glowRight)"/>

  <g opacity="0.36">
    <path d="M0 410 L550 110 L900 110 L350 410 Z" fill="#123252"/>
    <path d="M700 -20 L1180 -20 L760 500 L280 500 Z" fill="#17253b"/>
    <path d="M1300 0 L1600 0 L1600 500 L980 500 Z" fill="#1f2638"/>
  </g>

  <g>
    <line x1="160" y1="108" x2="1440" y2="108" stroke="url(#lineGrad)" stroke-width="3"/>
    <line x1="160" y1="382" x2="1440" y2="382" stroke="url(#lineGrad)" stroke-width="3"/>
  </g>

  <g>
    <text x="800" y="238"
          font-family="Space Grotesk, Sora, Bahnschrift, Segoe UI, sans-serif"
          font-size="150"
          font-weight="800"
          letter-spacing="5"
          text-anchor="middle"
          fill="url(#titleGrad)"
          filter="url(#titleGlow)">NEOMACS</text>

    <text x="804" y="242"
          font-family="Space Grotesk, Sora, Bahnschrift, Segoe UI, sans-serif"
          font-size="150"
          font-weight="800"
          letter-spacing="5"
          text-anchor="middle"
          fill="none"
          stroke="#c8f7ff"
          stroke-opacity="0.22"
          stroke-width="2.5">NEOMACS</text>

    <text x="800" y="306"
          font-family="JetBrains Mono, Cascadia Code, Consolas, monospace"
          font-size="30"
          letter-spacing="3"
          text-anchor="middle"
          fill="#d9efff">Next generation of Emacs</text>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="1510" cy="70" r="4" fill="#67efff"/>
    <circle cx="1460" cy="430" r="3" fill="#ffbf67"/>
    <circle cx="1180" cy="68" r="2.4" fill="#99ffc9"/>
    <circle cx="540" cy="430" r="2.2" fill="#78dfff"/>
    <circle cx="320" cy="58" r="2.8" fill="#ffcf6b"/>
  </g>
</svg>
