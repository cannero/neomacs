name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (linux)
    runs-on: self-hosted
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (pacman)
        run: |
          sudo pacman -Syu --noconfirm --needed \
            base-devel \
            git \
            pkgconf \
            cmake \
            m4 \
            gmp \
            openssl \
            fontconfig \
            freetype2 \
            harfbuzz \
            libxkbcommon \
            libxkbcommon-x11 \
            wayland \
            wayland-protocols \
            libxcb \
            libxrandr \
            libxinerama \
            libxi \
            libxcursor \
            mesa \
            vulkan-headers \
            vulkan-icd-loader \
            dbus \
            systemd-libs \
            sqlite \
            libxml2 \
            zlib \
            gnutls

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-file: rust-toolchain.toml

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Verify build with cargo xtask fresh-build
        run: cargo xtask fresh-build

      - name: Run unit tests with cargo nextest run --no-fail-fast
        run: cargo nextest run --no-fail-fast
