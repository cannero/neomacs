name: Bug Report
description: Report a bug in neomacs
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug.

        Before submitting, please collect build/runtime diagnostics.

        1. Run build info:
           ```bash
           ./target/release/neomacs --help
           ```
        2. Reproduce with verbose logs:
           ```bash
           RUST_LOG=debug NEOMACS_LOG=info ./target/release/neomacs 2>&1 | tee neomacs-debug.log
           ```
        3. In **Extra context**, upload `neomacs-debug.log` (or paste key excerpts).

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is wrong?
      placeholder: Describe the observed behavior.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact, minimal steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: false

  - type: textarea
    id: build_info
    attributes:
      label: Runtime diagnostics
      description: Paste the full output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: |
        Screenshots, videos, bisect results, related issues, and upload DEBUG level logs file: (get verbose logs by `RUST_LOG=debug` envirnment .
    validations:
      required: false
